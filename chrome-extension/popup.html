<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GrantFlow Extension</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <section class="hero-card">
        <p class="eyebrow">GrantFlow Extension</p>
        <h1>Grant Application Assistant</h1>
        <p class="subtitle">Sync your uploaded documents, then autofill only the fields we can support confidently. Unknowns stay blank.</p>
        <div class="hero-actions">
          <button id="autofill-button" type="button" disabled>Autofill Page</button>
          <div class="hero-secondary-actions">
            <button id="connect-platform-button" type="button">Connect &amp; Sync</button>
            <button id="open-platform-button" type="button" class="secondary-button">Open GrantFlow</button>
          </div>
        </div>
      </section>

      <section class="panel-card">
        <p class="section-label">Synced Files</p>
        <div id="profile-summary" class="profile-summary-card">
          <p class="field-meta">No synced documents yet. Upload files in GrantFlow, then click sync.</p>
        </div>
      </section>

      <div id="status-card" class="status-card status-card--idle">
        <div class="status-indicator" aria-hidden="true">
          <span class="status-dot"></span>
          <span class="status-dot"></span>
          <span class="status-dot"></span>
        </div>
        <p id="status" class="status">Ready.</p>
      </div>

      <div id="results" class="results"></div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
